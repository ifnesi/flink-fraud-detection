<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confluent: Fraud Detection</title>
  <link rel="icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}?v=5">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/leaflet/leaflet.css') }}?v=5">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v=5">
  
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- JS -->
  <script src="{{ url_for('static', filename='js/socket.io.min.js') }}?v=5"></script>
  <script src="{{ url_for('static', filename='js/jquery.min.js') }}?v=5"></script>
  <script src="{{ url_for('static', filename='js/leaflet.js') }}?v=5"></script>
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}?v=5"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}?v=5"></script>
</head>
<body>
  <div class="full-height">
    <div class="row h-100">
      <!-- Left Panel: Header, User Select, Stats, Map -->
      <div class="col-md-8 col-lg-9 left-panel d-flex flex-column">
        <!-- Header Bar -->
        <div class="top-header">
          <div class="header-content">
            <div class="header-title">
              <i class="bi bi-shield-lock-fill header-icon"></i>
              <div class="title-text">
                <h1 class="main-title">Fraud Detection</h1>
                <p class="sub-title">Real-Time Monitoring</p>
              </div>
            </div>
            <div class="header-right">
              <div class="status-badge" id="ws_status">
                <span class="status-indicator"></span>
                <span class="status-text">Connecting...</span>
              </div>
            </div>
          </div>
        </div>

        <!-- Control Bar -->
        <div class="control-bar">
          <!-- User Select -->
          <div class="user-select-inline">
            <label for="userIdSelect" class="form-label">
              <i class="bi bi-person-circle me-2"></i>Active User
            </label>
            <select class="form-select form-select-modern" id="userIdSelect">
              {% for user_id, user_name in users.items() %}
                <option value="{{ user_id }}">{{ user_id }}: {{ user_name }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- Stats Cards -->
          <div class="stats-inline">
            <div class="stat-card-inline">
              <div class="stat-icon stat-icon-primary">
                <i class="bi bi-activity"></i>
              </div>
              <div class="stat-content">
                <div class="stat-label">Total Events</div>
                <div class="stat-value" id="total-events">0</div>
              </div>
            </div>
            <div class="stat-card-inline">
              <div class="stat-icon stat-icon-danger">
                <i class="bi bi-exclamation-triangle"></i>
              </div>
              <div class="stat-content">
                <div class="stat-label">Fraud Detected</div>
                <div class="stat-value" id="fraud-count">0</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Map Area -->
        <div class="map-container">
          <div id="map"></div>
          <div class="map-overlay">
            <div class="map-controls">
              <button class="map-control-btn" id="recenterMap" title="Recenter map">
                <i class="bi bi-geo-alt"></i>
              </button>
              <button class="map-control-btn" id="toggleFullscreen" title="Toggle fullscreen">
                <i class="bi bi-arrows-fullscreen"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Panel: Activity Log (Full Height) -->
      <div class="col-md-4 col-lg-3 right-panel d-flex flex-column">
        <div class="logs-container">
          <div class="logs-header">
            <i class="bi bi-terminal me-2"></i>
            <span>Activity Log</span>
            <button class="btn-clear-logs" id="clearLogs" title="Clear logs">
              <i class="bi bi-trash"></i>
            </button>
          </div>
          <div class="logs-body" id="logs">
            <div class="log-welcome">
              <i class="bi bi-info-circle"></i>
              <p>Waiting for transactions...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transaction Amount Modal -->
  <div id="amountModal" class="amount-modal">
    <div class="amount-modal-content">
      <div class="amount-modal-header">
        <span class="amount-modal-title">Enter Transaction Amount</span>
        <button class="amount-modal-close" id="closeAmountModal">
          <span>×</span>
        </button>
      </div>
      <div class="amount-modal-body">
        <div class="amount-input-group">
          <span class="amount-currency">$</span>
          <input type="text" id="amountInput" class="amount-input" placeholder="0.00" autocomplete="off">
        </div>
      </div>
      <div class="amount-modal-footer">
        <button class="amount-btn amount-btn-cancel" id="cancelAmount">Cancel</button>
        <button class="amount-btn amount-btn-submit" id="submitAmount">Submit</button>
      </div>
    </div>
  </div>

</body>
</html>
